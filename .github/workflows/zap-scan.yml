name: OWASP ZAP API Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  zap_api_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Start Spring Boot app
        run: |
          chmod +x fitnesss/mvnw
          nohup fitnesss/mvnw -f fitnesss/pom.xml -DskipTests spring-boot:run > app.log 2>&1 &

      - name: Wait for app health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null; then
              echo "Application is up"
              exit 0
            fi
            sleep 5
          done
          echo "Application failed to start"
          tail -n 200 app.log || true
          exit 1

      - name: Run OWASP ZAP API scan
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t http://localhost:8080/v3/api-docs \
            -f openapi \
            -J /zap/wrk/zap-report.json \
            -r /zap/wrk/zap-report.html \
            -w /zap/wrk/zap-report.md \
            -I

      - name: Convert ZAP report to SARIF
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("zap-report.json")
          sarif_path = Path("zap-report.sarif")

          data = json.loads(report_path.read_text(encoding="utf-8"))
          results = []
          site_list = data.get("site", [])

          severity_map = {"0": "note", "1": "warning", "2": "error", "3": "error"}

          for site in site_list:
            for alert in site.get("alerts", []):
              rule_id = f"ZAP-{alert.get('pluginid', 'UNKNOWN')}"
              level = severity_map.get(str(alert.get("riskcode", "0")), "warning")
              message = alert.get("alert", "ZAP finding")
              description = alert.get("desc", "")
              cwe = alert.get("cweid", "")
              instances = alert.get("instances", []) or [{}]

              for inst in instances:
                uri = inst.get("uri", site.get("@name", ""))
                results.append(
                  {
                    "ruleId": rule_id,
                    "level": level,
                    "message": {"text": message},
                    "locations": [
                      {
                        "physicalLocation": {
                          "artifactLocation": {"uri": uri}
                        }
                      }
                    ],
                    "properties": {
                      "description": description,
                      "risk": alert.get("riskdesc", ""),
                      "solution": alert.get("solution", ""),
                      "reference": alert.get("reference", ""),
                      "cwe": cwe,
                    },
                  }
                )

          sarif = {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {"driver": {"name": "OWASP ZAP", "rules": []}},
                "results": results,
              }
            ],
          }

          sarif_path.write_text(json.dumps(sarif, indent=2), encoding="utf-8")
          PY

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap-report.sarif

      - name: Upload ZAP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-artifacts
          path: |
            app.log
            zap-report.json
            zap-report.html
            zap-report.md
